  <body class="text-center">
    
<form class="form-signin" method="POST" action="{{ url_for('logando')}}">

  <label for="inputPassword" class="sr-only">Senha</label>
  <input type="password" id="passw" name="passw" class="form-control" placeholder="senha" required="">
  <div class="mb-3">
  </div>
  <button class="btn btn-lg btn-primary btn-block" type="submit">Logar</button>
  
</form>
